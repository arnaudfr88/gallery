name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "support/as-server"
    paths:
      - 'Android/**'
  pull_request:
    branches:
      - "main"
      - "support/as-server"
    paths:
      - 'Android/**'

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android/src
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build
        run: ./gradlew assembleRelease
